# Spielgarten - nginx site config.
# Loaded into /etc/nginx/conf.d/default.conf inside the http {} context.

# Long-cache only the content-hashed build assets; revalidate everything else
# (index.html, the service worker and the manifest must stay fresh).
map $uri $spielgarten_cache {
    default      "no-cache";
    ~^/assets/   "public, max-age=31536000, immutable";
}

server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    server_tokens off;

    # ---- Caching ----
    add_header Cache-Control $spielgarten_cache always;

    # ---- Security headers (applied to every response) ----
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "no-referrer" always;
    add_header Cross-Origin-Opener-Policy   "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), usb=(), payment=()" always;
    add_header Content-Security-Policy    "default-src 'self'; base-uri 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'; form-action 'self'; object-src 'none'" always;

    # ---- Compression ----
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    # ---- Health check (used by the Docker / Compose health probe) ----
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- SPA routing: unknown paths fall back to the app shell ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
