version: 2

updates:
  # npm dependencies - keeps the app on the latest patched releases.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      production-dependencies:
        dependency-type: production
        update-types: [minor, patch]
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]

  # GitHub Actions used in the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Docker base images referenced in the Dockerfile.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
